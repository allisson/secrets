name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Docs Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Changelog guard (docs-only PRs)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          CHANGED_FILES="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if [ -z "$CHANGED_FILES" ]; then
            exit 0
          fi

          docs_only=true
          changelog_updated=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Check if root CHANGELOG.md was updated
            if [ "$file" = "CHANGELOG.md" ]; then
              changelog_updated=true
            fi

            # Determine if this PR is docs-only
            case "$file" in
              docs/*|README.md)
                ;;
              *)
                docs_only=false
                ;;
            esac
          done <<EOF
          $CHANGED_FILES
          EOF

          if [ "$docs_only" = true ] && [ "$changelog_updated" = false ]; then
            echo "Documentation-only PRs must update CHANGELOG.md"
            exit 1
          fi

      - name: API docs consistency guard (PRs)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Requires Bash 4.0+ for ** glob patterns (GitHub Actions uses Bash 5.2.21)

          CHANGED_FILES="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if [ -z "$CHANGED_FILES" ]; then
            exit 0
          fi

          api_changed=false
          docs_changed=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # API/runtime implementation changes
            case "$file" in
              internal/*/http/*.go|cmd/app/commands/*.go|migrations/*/*.sql)
                api_changed=true
                ;;
            esac

            # Documentation files that should be updated when API changes
            case "$file" in
              docs/*.md|docs/**/*.md|\
              docs/openapi.yaml|\
              CHANGELOG.md|\
              README.md)
                docs_changed=true
                ;;
            esac
          done <<EOF
          $CHANGED_FILES
          EOF

          if [ "$api_changed" = true ] && [ "$docs_changed" = false ]; then
            echo "API/runtime changes detected but no related docs updates found"
            echo "Update docs/**/*.md, docs/openapi.yaml, or CHANGELOG.md as needed"
            exit 1
          fi

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .markdownlint.json
          globs: |
            README.md
            docs/**/*.md
            .github/pull_request_template.md

      - name: Example shape checks
        run: python3 docs/tools/check_example_shapes.py

      - name: OpenAPI validation
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-cache-dir openapi-spec-validator==0.7.1
          python3 -m openapi_spec_validator docs/openapi.yaml

      - name: Markdown link check (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress "README.md" "docs/**/*.md" ".github/pull_request_template.md"

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run tests
        run: make test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u testuser -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3307:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -v -race -p 1 -coverprofile=coverage-integration.out -tags=integration ./...
        env:
          TEST_POSTGRES_DSN: "postgres://testuser:testpassword@localhost:5433/testdb?sslmode=disable"
          TEST_MYSQL_DSN: "testuser:testpassword@tcp(localhost:3307)/testdb?parseTime=true"

      - name: Integration test coverage
        run: go tool cover -func=coverage-integration.out
